name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate firebase-config.js from secrets
        run: |
          cat > firebase-config.js <<EOF
          const firebaseConfig = {
            apiKey:            "${{ secrets.FIREBASE_API_KEY }}",
            authDomain:        "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket:     "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId:             "${{ secrets.FIREBASE_APP_ID }}",
            measurementId:     "${{ secrets.FIREBASE_MEASUREMENT_ID }}"
          };
          firebase.initializeApp(firebaseConfig);
          EOF

      - name: Generate ai-config.js from secrets
        run: |
          cat > ai-config.js <<EOF
          window.aiConfig = {
            enabled:    "${{ secrets.GROQ_PROXY_URL }}" !== "",
            apiBaseUrl: "${{ secrets.GROQ_PROXY_URL }}"
          };
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.gitignore,*.example.js,*.md'
