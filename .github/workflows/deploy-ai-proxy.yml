name: Deploy Groq AI Proxy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'ai-proxy/**'
      - '.github/workflows/deploy-ai-proxy.yml'

jobs:
  deploy-proxy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Inject Groq secret into worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "GROQ_API_KEY is missing"
            exit 1
          fi
          npx wrangler secret put GROQ_API_KEY --name tic-tac-groq-proxy <<< "$GROQ_API_KEY"

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
