<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Tic-Tac-Toe</h1>

    <div class="player-setup" id="playerSetup">
      <div class="input-group">
        <label for="player1Name">Player 1 (X)</label>
        <input type="text" id="player1Name" placeholder="Enter name" maxlength="20" />
      </div>
      <div class="input-group">
        <label for="player2Name">Player 2 (O)</label>
        <input type="text" id="player2Name" placeholder="Enter name" maxlength="20" />
      </div>
      <button id="startBtn" class="btn btn-primary">Start Game</button>
    </div>

    <div class="game-area hidden" id="gameArea">
      <div class="status" id="status"></div>

      <div class="scoreboard">
        <div class="score-card" id="scoreCard1">
          <span class="score-name" id="scoreLabel1">Player 1</span>
          <span class="score-value" id="score1">0</span>
        </div>
        <div class="score-card draws">
          <span class="score-name">Draws</span>
          <span class="score-value" id="scoreDraw">0</span>
        </div>
        <div class="score-card" id="scoreCard2">
          <span class="score-name" id="scoreLabel2">Player 2</span>
          <span class="score-value" id="score2">0</span>
        </div>
      </div>

      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>

      <div class="actions">
        <button class="btn btn-secondary" id="restartBtn">Restart Round</button>
        <button class="btn btn-outline" id="newGameBtn">New Game</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
